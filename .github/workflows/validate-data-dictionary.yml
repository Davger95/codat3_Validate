name: Validate Data Dictionary

on:
  workflow_dispatch:
    inputs:
      workbook_path:
        description: 'Optional relative path to the workbook (.xlsx). If empty, the workflow auto-detects the newest Strukturvorlage/Test workbook.'
        required: false
        default: ''
  push:
    paths:
      - '**/*.xlsx'
      - '.github/workflows/validate-data-dictionary.yml'
      - 'scripts/schemaforge/validate_strukturvorlage.py'
      - 'scripts/schemaforge/run_github_validation.py'
  pull_request:
    paths:
      - '**/*.xlsx'
      - '.github/workflows/validate-data-dictionary.yml'
      - 'scripts/schemaforge/validate_strukturvorlage.py'
      - 'scripts/schemaforge/run_github_validation.py'

jobs:
  validate-dd:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl rdflib

      - name: Run validator and generate reports
        id: validate
        run: |
          python scripts/schemaforge/run_github_validation.py \
            --workspace . \
            --workbook-path "${{ github.event.inputs.workbook_path }}"

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dd-validation-reports
          path: |
            SchemaForge_output/github_validation_report.json
            SchemaForge_output/github_validation_report.md
            SchemaForge_output/github_validation_summary.json
          if-no-files-found: error

      - name: Add Markdown report to job summary
        run: |
          cat SchemaForge_output/github_validation_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if blocking validation errors exist
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          summary = json.loads(Path('SchemaForge_output/github_validation_summary.json').read_text())
          print(summary)
          raise SystemExit(0 if summary.get('pipeline_valid') else 1)
          PY
