name: Validate Data Dictionary

on:
  workflow_dispatch:
    inputs:
      workbook_path:
        description: 'Optional relative path to the workbook (.xlsx). Defaults to the canonical aligned empty template.'
        required: false
        default: 'templates/Strukturvorlage Datenkataloge_Abgeglichen_v2__empty.xlsx'
      fail_on_validation_errors:
        description: 'Fail the workflow when blocking validation errors exist. Set to false for example/test workbooks when you only want reports.'
        required: false
        default: 'false'
  push:
    paths:
      - '**/*.xlsx'
      - '.github/workflows/validate-data-dictionary.yml'
      - 'scripts/schemaforge/validate_strukturvorlage.py'
      - 'scripts/schemaforge/run_github_validation.py'
      - 'scripts/schemaforge/readers/**/*.py'
  pull_request:
    paths:
      - '**/*.xlsx'
      - '.github/workflows/validate-data-dictionary.yml'
      - 'scripts/schemaforge/validate_strukturvorlage.py'
      - 'scripts/schemaforge/run_github_validation.py'
      - 'scripts/schemaforge/readers/**/*.py'

jobs:
  validate-dd:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl rdflib

      - name: Run validator and generate reports
        id: validate
        run: |
          python scripts/schemaforge/run_github_validation.py \
            --workspace . \
            --workbook-path "${{ github.event.inputs.workbook_path || 'templates/Strukturvorlage Datenkataloge_Abgeglichen_v2__empty.xlsx' }}"

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dd-validation-reports
          path: |
            SchemaForge_output/github_validation_report.json
            SchemaForge_output/github_validation_report.md
            SchemaForge_output/github_validation_summary.json
          if-no-files-found: error

      - name: Add Markdown report to job summary
        run: |
          cat SchemaForge_output/github_validation_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if blocking validation errors exist
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.fail_on_validation_errors == 'true' }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          summary = json.loads(Path('SchemaForge_output/github_validation_summary.json').read_text())
          print(summary)
          ok = (
              summary.get('parser_valid') is True and
              summary.get('pipeline_valid') is True and
              summary.get('governance_valid') is True and
              int(summary.get('errors', 0)) == 0
          )
          raise SystemExit(0 if ok else 1)
          PY
