name: Validate Data Dictionary

on:
  push:
    branches:
      - main
    paths:
      - 'templates/**/*.xlsx'
      - 'scripts/validator/validate_strukturvorlage.py'
      - 'scripts/validator/run_github_validation.py'
      - 'scripts/validator/readers/**/*.py'
      - '.github/workflows/validate-data-dictionary.yml'
  pull_request:
    paths:
      - 'templates/**/*.xlsx'
      - 'scripts/validator/validate_strukturvorlage.py'
      - 'scripts/validator/run_github_validation.py'
      - 'scripts/validator/readers/**/*.py'
      - '.github/workflows/validate-data-dictionary.yml'
  workflow_dispatch:
    inputs:
      workbook_path:
        description: 'Relativer Pfad zur zu validierenden .xlsx-Datei'
        required: false
        default: 'templates/Strukturvorlage_DataDictionary_v2_empty.xlsx'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl rdflib

      - name: Determine workbook path
        id: workbook
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.workbook_path }}" ]; then
            echo "path=${{ github.event.inputs.workbook_path }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=templates/Strukturvorlage_DataDictionary_v2_empty.xlsx" >> "$GITHUB_OUTPUT"
          fi

      - name: Run validation wrapper
        run: |
          python scripts/validator/run_github_validation.py \
            --workspace . \
            --workbook-path "${{ steps.workbook.outputs.path }}"

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            SchemaForge_output/github_validation_report.json
            SchemaForge_output/github_validation_report.md
            SchemaForge_output/github_validation_summary.json
